<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Página de Inicio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --accent-color: #2980b9;
            --background-color: #f5f7fa;
            --card-bg: #ffffff;
            --text-color: #333333;
            --text-secondary: #7f8c8d;
            --border-color: #e0e6ed;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            --shadow-hover: 0 10px 15px rgba(0, 0, 0, 0.1);
            --note-bg: #fffacd;
        }

        body.dark-theme {
            --primary-color: #ecf0f1;
            --secondary-color: #3498db;
            --accent-color: #2980b9;
            --background-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --text-secondary: #aaaaaa;
            --border-color: #333333;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            --shadow-hover: 0 10px 15px rgba(0, 0, 0, 0.5);
            --note-bg: #2c2c1e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--background-color); color: var(--text-color); line-height: 1.6; transition: background-color 0.3s; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        
        header { 
            display: grid; 
            grid-template-columns: 1fr 2fr 1fr; 
            align-items: center; 
            margin-bottom: 30px; 
            padding: 15px 25px; 
            background-color: var(--card-bg); 
            border-radius: 12px; 
            box-shadow: var(--shadow); 
        }

        .datetime { font-size: 1.1rem; font-weight: 500; color: var(--primary-color); }
        
        .header-quote { 
            text-align: center; 
            padding: 0 20px; 
            font-style: italic; 
            font-size: 0.85rem; 
            color: var(--text-secondary);
            border-left: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
        }
        .header-quote span { display: block; font-weight: 600; font-size: 0.75rem; margin-top: 3px; color: var(--secondary-color); text-transform: uppercase; }

        .header-right { display: flex; align-items: center; justify-content: flex-end; gap: 15px; }
        .theme-toggle { background: none; border: none; color: var(--text-color); font-size: 1.2rem; cursor: pointer; transition: 0.3s; }
        .theme-toggle:hover { color: var(--secondary-color); }

        .weather { display: flex; align-items: center; gap: 8px; }
        .weather-icon img { width: 40px; }
        .weather-temp { font-size: 1.2rem; font-weight: 600; }

        .quick-links { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 30px; }
        .link-button { display: flex; align-items: center; justify-content: center; padding: 12px; background-color: var(--card-bg); border-radius: 10px; box-shadow: var(--shadow); text-decoration: none; color: var(--text-color); font-size: 0.9rem; transition: 0.3s; }
        .link-button:hover { background-color: var(--secondary-color); color: white; transform: translateY(-2px); }
        .link-button i { margin-right: 8px; font-size: 1.1rem; }

        .dashboard, .dashboard-second-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }

        .card { background-color: var(--card-bg); border-radius: 10px; padding: 20px; box-shadow: var(--shadow); transition: 0.3s; height: 100%; }
        .card:hover { box-shadow: var(--shadow-hover); }
        .card-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 15px; color: var(--primary-color); display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border-color); padding-bottom: 8px; }
        .card-title i { color: var(--secondary-color); }

        .todo-list { list-style-type: none; max-height: 200px; overflow-y: auto; }
        .todo-item { display: flex; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border-color); }
        .todo-text.completed { text-decoration: line-through; color: var(--text-secondary); }
        .todo-delete { margin-left: auto; color: var(--text-secondary); cursor: pointer; font-size: 0.8rem; }
        .add-todo { display: flex; margin-top: 15px; }
        .add-todo input { flex-grow: 1; padding: 8px; border: 1px solid var(--border-color); border-radius: 5px 0 0 5px; background: transparent; color: var(--text-color); font-size: 0.9rem; }
        .add-todo button { padding: 8px 12px; background-color: var(--secondary-color); color: white; border: none; border-radius: 0 5px 5px 0; cursor: pointer; }

        .sticky-note { background-color: var(--note-bg); padding: 15px; border-radius: 8px; height: 230px; box-shadow: inset 0 0 10px rgba(0,0,0,0.05); }
        .sticky-note textarea { width: 100%; height: 100%; background: transparent; border: none; resize: none; outline: none; color: var(--text-color); font-family: 'Segoe UI', sans-serif; font-size: 0.95rem; line-height: 1.4; }

        .news-item { padding: 8px 0; border-bottom: 1px solid var(--border-color); }
        .news-title a { color: var(--text-color); text-decoration: none; font-weight: 500; font-size: 0.9rem; }
        .news-source { font-size: 0.75rem; color: var(--text-secondary); margin-top: 2px; }

        .legal-links { display: flex; flex-direction: column; gap: 12px; }
        .legal-btn { display: flex; align-items: center; padding: 12px 15px; background-color: var(--background-color); border-radius: 8px; text-decoration: none; color: var(--text-color); font-weight: 500; font-size: 0.9rem; border: 1px solid var(--border-color); transition: 0.3s; }
        .legal-btn:hover { background-color: var(--secondary-color); color: white; border-color: var(--secondary-color); transform: translateX(5px); }
        .legal-btn i { margin-right: 12px; font-size: 1.2rem; color: var(--secondary-color); transition: 0.3s; width: 20px; text-align: center; }
        .legal-btn:hover i { color: white; }

        .match-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border-color); align-items: center; }
        .team { display: flex; align-items: center; gap: 8px; flex: 1; font-size: 0.85rem; font-weight: 500; }
        .team:last-child { justify-content: flex-end; }
        .team-logo { width: 24px; height: 24px; border-radius: 50%; background-color: var(--secondary-color); display: flex; align-items: center; justify-content: center; color: white; font-size: 0.6rem; }
        .match-info { text-align: center; font-size: 0.7rem; color: var(--text-secondary); min-width: 90px; }

        .music-controls { display: flex; justify-content: center; gap: 15px; margin-bottom: 15px; }
        .music-btn { width: 40px; height: 40px; border-radius: 50%; background: var(--secondary-color); color: white; border: none; cursor: pointer; }
        .live-indicator { width: 100%; height: 4px; background: var(--border-color); border-radius: 2px; overflow: hidden; margin-top: 10px; }
        .live-indicator-bar.playing { height: 100%; width: 40%; background: var(--secondary-color); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { margin-left: -40%; } 100% { margin-left: 100%; } }
        .source-selector { width: 100%; padding: 8px; border-radius: 5px; background: var(--card-bg); color: var(--text-color); border: 1px solid var(--border-color); margin-top: 10px; font-size: 0.85rem; }

        @media (max-width: 1024px) { header { grid-template-columns: 1fr 1fr; } .header-quote { display: none; } .dashboard, .dashboard-second-row { grid-template-columns: 1fr 1fr; } }
        @media (max-width: 768px) { .dashboard, .dashboard-second-row { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="datetime" id="datetime"></div>
            <div class="header-quote" id="header-quote">
                "<span id="quote-text">...</span>"
                <span id="quote-author"></span>
            </div>
            <div class="header-right">
                <button id="theme-toggle" class="theme-toggle"><i class="fas fa-moon"></i></button>
                <div class="weather">
                    <div id="weather-icon"></div>
                    <div class="weather-temp" id="weather-temp">--°C</div>
                </div>
            </div>
        </header>

        <div class="quick-links">
            <a href="https://mail.google.com" target="_blank" class="link-button"><i class="fas fa-envelope"></i> Gmail</a>
            <a href="https://guaca.scba.gov.ar/guacamole" target="_blank" class="link-button"><i class="fas fa-desktop"></i> Guacamole</a>
            <a href="https://outlook.office365.com" target="_blank" class="link-button"><i class="fas fa-envelope-open-text"></i> Outlook</a>
            <a href="https://www.reddit.com/r/DerechoGenial/new/" target="_blank" class="link-button"><i class="fab fa-reddit"></i> Derecho Genial</a>
            <a href="https://www.youtube.com" target="_blank" class="link-button"><i class="fab fa-youtube"></i> YouTube</a>
            <a href="https://web.whatsapp.com/" target="_blank" class="link-button"><i class="fab fa-whatsapp"></i> WhatsApp</a>
        </div>

        <div class="dashboard">
            <div class="card">
                <div class="card-title"><i class="fas fa-link"></i> Herramientas</div>
                <div class="legal-links">
                    <a href="https://jglazarte.github.io/web/" target="_blank" class="legal-btn">
                        <i class="fas fa-laptop-code"></i> Mi Web de Proyectos
                    </a>
                    <a href="https://servicios.infoleg.gob.ar/infolegInternet/anexos/235000-239999/235975/texact.htm" target="_blank" class="legal-btn">
                        <i class="fas fa-book"></i> Código Civil y Comercial
                    </a>
                    <a href="https://normas.gba.gob.ar/documentos/VrQlgSOB.html" target="_blank" class="legal-btn">
                        <i class="fas fa-balance-scale"></i> Código Procesal BA
                    </a>
                </div>
            </div>

            <div class="card">
                <div class="card-title"><i class="fas fa-music"></i> Radio Focus</div>
                <div class="music-player">
                    <div class="music-controls">
                        <button class="music-btn" id="prev-btn"><i class="fas fa-backward"></i></button>
                        <button class="music-btn" id="play-btn"><i class="fas fa-play"></i></button>
                        <button class="music-btn" id="next-btn"><i class="fas fa-forward"></i></button>
                    </div>
                    <div class="music-info">
                        <div class="music-title" id="music-title">Lofi Girl</div>
                        <div class="music-artist" id="music-artist">Radio 24/7</div>
                        <div class="live-indicator"><div class="live-indicator-bar" id="live-indicator-bar"></div></div>
                    </div>
                    <select id="source-selector" class="source-selector">
                        <option value="lofigirl">📻 Lofi Radio</option>
                        <option value="jazz">📻 Jazz Cafe</option>
                        <option value="classical">📻 Clásica FM</option>
                    </select>
                    <audio id="audio-player"></audio>
                </div>
            </div>

            <div class="card">
                <div class="card-title"><i class="fas fa-tasks"></i> Tareas</div>
                <ul class="todo-list" id="todo-list"></ul>
                <div class="add-todo">
                    <input type="text" id="todo-input" placeholder="Nueva tarea...">
                    <button id="add-todo-btn"><i class="fas fa-plus"></i></button>
                </div>
            </div>
        </div>

        <div class="dashboard-second-row">
            <div class="card">
                <div class="card-title"><i class="fas fa-calendar-alt"></i> Próximos Partidos</div>
                <div id="matches-container"><div class="loading"></div></div>
            </div>

            <div class="card">
                <div class="card-title"><i class="fas fa-newspaper"></i> Noticias</div>
                <div id="news-container"><div class="loading"></div></div>
            </div>

            <div class="card">
                <div class="card-title"><i class="fas fa-sticky-note"></i> Nota Rápida</div>
                <div class="sticky-note">
                    <textarea id="sticky-note" placeholder="Escribe tus pensamientos aquí..."></textarea>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- TEMA OSCURO ---
        const themeBtn = document.getElementById('theme-toggle');
        if(localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-theme');
        themeBtn.onclick = () => {
            document.body.classList.toggle('dark-theme');
            localStorage.setItem('theme', document.body.classList.contains('dark-theme') ? 'dark' : 'light');
            themeBtn.innerHTML = document.body.classList.contains('dark-theme') ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
        };

        // --- HORA ---
        function updateTime() {
            const now = new Date();
            document.getElementById('datetime').textContent = now.toLocaleDateString('es-AR', { weekday: 'short', day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
        }
        setInterval(updateTime, 1000); updateTime();

        // --- CITAS ---
        const quotes = [
            { t: "Uno llega a ser lo que es por lo que lee.", a: "Jorge Luis Borges" },
            { t: "Siempre imaginé que el Paraíso sería algún tipo de biblioteca.", a: "Jorge Luis Borges" },
            { t: "De todos los instrumentos del hombre, el más asombroso es, sin duda, el libro.", a: "Jorge Luis Borges" },
            { t: "La duda es uno de los nombres de la inteligencia.", a: "Jorge Luis Borges" },
            { t: "El hombre está condenado a ser libre.", a: "Jean-Paul Sartre" },
            { t: "La libertad es lo que haces con lo que te han hecho.", a: "Jean-Paul Sartre" },
            { t: "Felicidad no es hacer lo que uno quiere, sino querer lo que uno hace.", a: "Jean-Paul Sartre" },
            { t: "El lenguaje es la casa del ser.", a: "Martin Heidegger" },
            { t: "La esencia de la técnica no es nada técnico.", a: "Martin Heidegger" },
            { t: "El hombre no es el señor del ente, es el pastor del ser.", a: "Martin Heidegger" },
            { t: "Solo hay mundo donde hay lenguaje.", a: "Martin Heidegger" },
            { t: "No me pregunten quién soy, ni me pidan que siga siendo el mismo.", a: "Michel Foucault" },
            { t: "Donde hay poder, hay resistencia.", a: "Michel Foucault" },
            { t: "El saber es el único espacio de libertad del ser.", a: "Michel Foucault" },
            { t: "Hoy el alma se siente cansada de sí misma.", a: "Byung-Chul Han" },
            { t: "El exceso de positividad se manifiesta como exceso de estímulos.", a: "Byung-Chul Han" },
            { t: "La aventura es el resultado de una mala planificación.", a: "G.K. Chesterton" },
            { t: "Cualquier destino, por largo y complicado que sea, consta en realidad de un solo momento.", a: "Jorge Luis Borges" },
            { t: "Lo más importante de un hombre es lo que da por sentado.", a: "G.K. Chesterton" }
        ];
        const q = quotes[Math.floor(Math.random()*quotes.length)];
        document.getElementById('quote-text').textContent = q.t;
        document.getElementById('quote-author').textContent = q.a;

        // --- STICKY NOTE ---
        const sNote = document.getElementById('sticky-note');
        sNote.value = localStorage.getItem('stickyContent') || '';
        sNote.oninput = () => localStorage.setItem('stickyContent', sNote.value);

        // --- TAREAS ---
        const tInput = document.getElementById('todo-input');
        let todos = JSON.parse(localStorage.getItem('todos')) || [];
        function renderTodos() {
            const list = document.getElementById('todo-list');
            list.innerHTML = '';
            todos.forEach((t, i) => {
                list.innerHTML += `<li class="todo-item">
                    <input type="checkbox" ${t.c?'checked':''} onclick="toggleTodo(${i})">
                    <span class="todo-text ${t.c?'completed':''}">${t.t}</span>
                    <i class="fas fa-trash todo-delete" onclick="deleteTodo(${i})"></i>
                </li>`;
            });
            localStorage.setItem('todos', JSON.stringify(todos));
        }
        window.toggleTodo = i => { todos[i].c = !todos[i].c; renderTodos(); };
        window.deleteTodo = i => { todos.splice(i, 1); renderTodos(); };
        document.getElementById('add-todo-btn').onclick = () => { if(tInput.value) { todos.push({t: tInput.value, c: false}); tInput.value=''; renderTodos(); } };
        renderTodos();

        // --- NOTICIAS ---
        async function loadNews() {
            try {
                const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent('https://news.google.com/rss?hl=es-419&gl=AR&ceid=AR:es-419')}`);
                const data = await res.json();
                document.getElementById('news-container').innerHTML = data.items.slice(0, 5).map(item => `
                    <div class="news-item">
                        <div class="news-title"><a href="${item.link}" target="_blank">${item.title.split(' - ')[0]}</a></div>
                        <div class="news-source">${item.title.split(' - ')[1] || 'Info'}</div>
                    </div>
                `).join('');
            } catch(e) { console.log("Error noticias"); }
        }
        loadNews();

        // --- MÚSICA ---
        const player = document.getElementById('audio-player');
        const stations = { lofigirl: "https://play.streamafrica.net/lofiradio", jazz: "https://stream.zeno.fm/f3wvbbqmdg8uv", classical: "http://174.36.206.197:8000/stream" };
        document.getElementById('play-btn').onclick = () => {
            if(player.paused) { player.play(); document.getElementById('play-btn').innerHTML = '<i class="fas fa-pause"></i>'; document.getElementById('live-indicator-bar').classList.add('playing'); }
            else { player.pause(); document.getElementById('play-btn').innerHTML = '<i class="fas fa-play"></i>'; document.getElementById('live-indicator-bar').classList.remove('playing'); }
        };
        document.getElementById('source-selector').onchange = (e) => { player.src = stations[e.target.value]; player.play(); };
        player.src = stations.lofigirl;

        // --- PARTIDOS ---
        async function loadMatches() {
            const container = document.getElementById('matches-container');
            let matches = [];

            // 1. Partidos de Fútbol (datos manuales porque las APIs públicas fallan con los calendarios de Argentina)
            const footMatches = [
                // Próximos de River (podés modificar las fechas y rivales aquí)
                { t1: 'River', t2: 'Rival a Confirmar', date: new Date('2026-05-05T17:00:00') },
                { t1: 'River', t2: 'Rival a Confirmar', date: new Date('2026-05-12T17:00:00') },
                // Selección Argentina
                { t1: 'Argentina', t2: 'Argelia', date: new Date('2026-06-16T22:00:00') }
            ];
            
            // Filtramos solo los que no pasaron
            footMatches.forEach(m => {
                if (m.date > new Date()) matches.push(m);
            });

            // 2. Partidos NBA (Knicks) dinámicos vía API
            try {
                const res = await fetch('https://site.api.espn.com/apis/site/v2/sports/basketball/nba/teams/nyk/schedule');
                const data = await res.json();
                const futureEvents = data.events?.filter(e => {
                    const status = e.competitions[0].status.type.name;
                    return status !== 'STATUS_FINAL' && status !== 'STATUS_POSTPONED' && status !== 'STATUS_CANCELED';
                }) || [];

                futureEvents.sort((a, b) => new Date(a.date) - new Date(b.date));
                const nextTwoKnicks = futureEvents.slice(0, 2);

                nextTwoKnicks.forEach(e => {
                    const comp = e.competitions[0];
                    const other = comp.competitors.find(c => c.team.abbreviation !== 'NY');
                    matches.push({ 
                        t1: 'Knicks', 
                        t2: other ? other.team.shortDisplayName : 'Rival', 
                        date: new Date(e.date) 
                    });
                });
            } catch(e) {
                console.log("Error API NBA");
            }

            // Ordenamos todos los partidos cronológicamente
            matches.sort((a,b) => a.date - b.date);

            if (matches.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:10px; color:var(--text-secondary); font-size:0.9rem;">No hay partidos programados</div>';
                return;
            }

            container.innerHTML = matches.map(m => `
                <div class="match-item">
                    <div class="team"><div class="team-logo">${m.t1.substring(0,2)}</div><span>${m.t1}</span></div>
                    <div class="match-info">
                        <strong>${m.date.toLocaleDateString('es-AR', {day:'numeric', month:'short'})}</strong><br>
                        ${m.date.toLocaleTimeString('es-AR', {hour:'2-digit', minute:'2-digit'})}
                    </div>
                    <div class="team"><span>${m.t2}</span><div class="team-logo">${m.t2.substring(0,2)}</div></div>
                </div>
            `).join('');
        }
        loadMatches();

        // --- CLIMA ---
        async function loadWeather() {
            try {
                const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=Azul,AR&appid=f8c63fec361f8883b26fd760da421a37&units=metric&lang=es`);
                const data = await res.json();
                document.getElementById('weather-temp').textContent = Math.round(data.main.temp) + "°C";
                document.getElementById('weather-icon').innerHTML = `<img src="https://openweathermap.org/img/wn/${data.weather[0].icon}.png">`;
            } catch(e) {}
        }
        loadWeather();
    </script>
</body>
</html>
