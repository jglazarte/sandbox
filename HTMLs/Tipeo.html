<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Velocidad de Escritura</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0d0d;
      --bg-secondary: #1a1a1a;
      --fg: #e8e4df;
      --muted: #6b6560;
      --accent: #c9a227;
      --accent-glow: rgba(201, 162, 39, 0.3);
      --correct: #4ade80;
      --error: #f87171;
      --error-bg: rgba(248, 113, 113, 0.15);
      --card: #141414;
      --border: #2a2825;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Crimson Pro', Georgia, serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .font-display {
      font-family: 'Space Grotesk', sans-serif;
    }

    /* Background atmosphere */
    .bg-atmosphere {
      position: fixed;
      inset: 0;
      background: 
        radial-gradient(ellipse 80% 50% at 20% 20%, rgba(201, 162, 39, 0.05) 0%, transparent 50%),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(201, 162, 39, 0.03) 0%, transparent 50%),
        linear-gradient(180deg, var(--bg) 0%, #0a0a0a 100%);
      pointer-events: none;
      z-index: -1;
    }

    .noise-overlay {
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      opacity: 0.03;
      pointer-events: none;
      z-index: -1;
    }

    /* Text display */
    .text-display {
      font-size: 1.35rem;
      line-height: 2;
      letter-spacing: 0.01em;
      scroll-behavior: smooth;
    }

    .char {
      position: relative;
      transition: color 0.1s ease;
    }

    .char.correct {
      color: var(--correct);
    }

    .char.incorrect {
      color: var(--error);
      background: var(--error-bg);
      border-radius: 2px;
    }

    .char.current {
      border-left: 2px solid var(--accent);
      animation: blink 1s infinite;
      margin-left: -1px;
    }

    .char.current::before {
      content: '';
      position: absolute;
      left: -2px;
      top: 0;
      bottom: 0;
      width: 2px;
      background: var(--accent);
      box-shadow: 0 0 10px var(--accent-glow);
    }

    @keyframes blink {
      0%, 50% { border-color: var(--accent); }
      51%, 100% { border-color: transparent; }
    }

    /* Input area */
    .input-area {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      transition: all 0.3s ease;
    }

    .input-area:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .input-area textarea {
      background: transparent;
      color: var(--fg);
      font-family: 'Crimson Pro', Georgia, serif;
      font-size: 1.2rem;
      line-height: 1.8;
      resize: none;
      outline: none;
      width: 100%;
    }

    .input-area textarea::placeholder {
      color: var(--muted);
    }

    /* Stats panel - compact */
    .stats-panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
    }

    .stat-item {
      text-align: center;
      padding: 0.5rem 1rem;
    }

    .stat-value {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent);
      line-height: 1.2;
    }

    .stat-label {
      font-size: 0.7rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    /* Progress bar */
    .progress-bar {
      height: 3px;
      background: var(--border);
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent) 0%, #e8c547 100%);
      width: 0%;
      transition: width 0.3s ease;
    }

    /* Results overlay */
    .results-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(20px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      visibility: hidden;
      transition: all 0.5s ease;
    }

    .results-overlay.visible {
      opacity: 1;
      visibility: visible;
    }

    .results-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 3rem;
      max-width: 500px;
      width: 90%;
      transform: scale(0.9) translateY(20px);
      transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .results-overlay.visible .results-card {
      transform: scale(1) translateY(0);
    }

    .wpm-display {
      font-size: 5rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent) 0%, #e8c547 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }

    /* Button */
    .btn-primary {
      background: var(--accent);
      color: var(--bg);
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      transition: all 0.2s ease;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-size: 0.875rem;
    }

    .btn-primary:hover {
      background: #d4ad2f;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px var(--accent-glow);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    /* Entrance animations */
    .fade-in-up {
      opacity: 0;
      transform: translateY(20px);
      animation: fadeInUp 0.6s ease forwards;
    }

    @keyframes fadeInUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .delay-1 { animation-delay: 0.1s; }
    .delay-2 { animation-delay: 0.15s; }
    .delay-3 { animation-delay: 0.2s; }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
      
      .text-display {
        scroll-behavior: auto;
      }
    }

    /* Responsive */
    @media (max-width: 640px) {
      .text-display {
        font-size: 1.1rem;
        line-height: 1.9;
      }
      
      .stat-value {
        font-size: 1.25rem;
      }
      
      .wpm-display {
        font-size: 3.5rem;
      }
      
      .results-card {
        padding: 2rem;
      }
    }
  </style>
</head>
<body class="min-h-screen">
  <div class="bg-atmosphere"></div>
  <div class="noise-overlay"></div>

  <main class="max-w-4xl mx-auto px-4 py-6 md:py-10">
    <!-- Header -->
    <header class="text-center mb-6 fade-in-up">
      <h1 class="font-display text-2xl md:text-3xl font-bold mb-1 tracking-tight">
        Velocidad de <span style="color: var(--accent);">Escritura</span>
      </h1>
    </header>

    <!-- Stats Panel - Compact inline -->
    <div class="stats-panel mb-6 fade-in-up delay-1">
      <div class="flex items-center justify-between px-2 py-2">
        <div class="stat-item">
          <div class="stat-value font-display" id="wpm">0</div>
          <div class="stat-label">PPM</div>
        </div>
        <div class="stat-item">
          <div class="stat-value font-display" id="accuracy">100</div>
          <div class="stat-label">Precision %</div>
        </div>
        <div class="stat-item">
          <div class="stat-value font-display" id="errors">0</div>
          <div class="stat-label">Errores</div>
        </div>
        <button class="btn-primary mr-2" id="restartBtn">
          Nuevo texto
        </button>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progress"></div>
      </div>
    </div>

    <!-- Text Display -->
    <div class="mb-4 fade-in-up delay-2">
      <div 
        id="textDisplay" 
        class="text-display p-5 md:p-6 rounded-xl"
        style="background: var(--card); border: 1px solid var(--border); max-height: 280px; overflow-y: auto;"
      ></div>
    </div>

    <!-- Input Area -->
    <div class="input-area p-4 fade-in-up delay-3">
      <textarea
        id="inputArea"
        rows="5"
        placeholder="Comienza a escribir aqui..."
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
      ></textarea>
    </div>

    <!-- Text source -->
    <p class="text-center mt-4 text-sm" style="color: var(--muted);">
      <span id="textAuthor"></span>
    </p>
  </main>

  <!-- Results Overlay -->
  <div class="results-overlay" id="resultsOverlay">
    <div class="results-card text-center">
      <h2 class="font-display text-xl font-semibold mb-2" style="color: var(--muted);">Tu velocidad</h2>
      <div class="wpm-display font-display" id="finalWpm">0</div>
      <p class="font-display text-lg mb-6" style="color: var(--muted);">palabras por minuto</p>
      
      <div class="grid grid-cols-2 gap-4 mb-8">
        <div class="p-4 rounded-lg" style="background: var(--bg);">
          <div class="text-2xl font-bold font-display" id="finalAccuracy">100%</div>
          <div class="text-sm" style="color: var(--muted);">Precision</div>
        </div>
        <div class="p-4 rounded-lg" style="background: var(--bg);">
          <div class="text-2xl font-bold font-display" id="finalTime">0s</div>
          <div class="text-sm" style="color: var(--muted);">Tiempo</div>
        </div>
      </div>

      <button class="btn-primary w-full" id="tryAgainBtn">
        Intentar de nuevo
      </button>
    </div>
  </div>

  <script>
    // Texts data with authors
    const textsData = [
      {
        text: "Toco tu boca, con un dedo toco el borde de tu boca, voy dibujándola como si saliera de mi mano, como si por primera vez tu boca se entreabriera, y me basta cerrar los ojos para deshacerlo todo y recomenzar, hago nacer cada vez la boca que deseo, la boca que mi mano elige y te dibuja en la cara, una boca elegida entre todas, con soberana libertad elegida por mí para dibujarla con mi mano por tu cara, y que por un azar que no busco comprender coincide exactamente con tu boca que sonríe por debajo de la que mi mano te dibuja.",
        author: "Julio Cortazar - Rayuela"
      },
      {
        text: "Me miras, de cerca me miras, cada vez más de cerca y entonces jugamos al cíclope, nos miramos cada vez más de cerca y nuestros ojos se agrandan, se acercan entre sí, se superponen y los cíclopes se miran, respirando confundidos, las bocas se encuentran y luchan tibiamente, mordiéndose con los labios, apoyando apenas la lengua en los dientes, jugando en sus recintos donde un aire pesado va y viene con un perfume viejo y un silencio. Entonces mis manos buscan hundirse en tu pelo, acariciar lentamente la profundidad de tu pelo mientras nos besamos como si tuviéramos la boca llena de flores o de peces, de movimientos vivos, de fragancia oscura. Y si nos mordemos el dolor es dulce, y si nos ahogamos en un breve y terrible absorber simultáneo del aliento, esa instantánea muerte es bella. Y hay una sola saliva y un solo sabor a fruta madura, y yo te siento temblar contra mí como una luna en el agua.",
        author: "Julio Cortazar - Rayuela"
      },
      {
        text: "Soy un hombre cobarde. Ahora lo digo, ahora que he llevado a término un plan que nadie no calificará de arriesgado. Yo sé que fue terrible su ejecución. No lo hice por Alemania, no. Nada me importa un país bárbaro, que me ha obligado a la abyección de ser un espía. Además, yo sé de un hombre de Inglaterra—un hombre modesto—que para mí no es menos que Goethe. Arriba de una hora no hablé con él, pero durante una hora fue Goethe... Lo hice, porque yo sentía que el Jefe tenía en poco a los de mi raza—a los innumerables antepasados que confluyen en mí. Yo quería probarle que un amarillo podía salvar a sus ejércitos. Además, yo debí huir del capitán. Sus manos y su voz podían golpear en cualquier momento a mi puerta. Me vestí sin ruido, me dije adiós en el espejo, bajé, escudriñé la calle tranquila y salí. La estación no distaba mucho de casa, pero juzgué preferible tomar un coche. Argüí que así corría menos peligro de ser reconocido; el hecho es que en la calle desierta me sentía visible y vulnerable, infinitamente. Recuerdo que le dije al cochero que se detuviera un poco antes de la entrada central. Bajé con lentitud voluntaria y casi penosa; iba a la aldea de Ashgove, pero saqué un pasaje para una estación más lejana. El tren salía dentro de muy pocos minutos, a las ocho y cincuenta. Me apresuré: el próximo saldría a las nueve y media. No había casi nadie en el andén. Recorrí los coches: recuerdo a unos labradores, una enlutada, un joven que leía con fervor los Anales de Tácito, un soldado herido y feliz. Los coches arrancaron al fin. Un hombre que reconocí corrió en vano hasta el límite del andén. Era el capitán Richard Madden. Aniquilado, trémulo, me encogí en la otra punta del sillón, lejos del temido cristal.",
        author: "Jorge Luis Borges - El jardin de senderos que se bifurcan"
      },
      {
        text: "Me es imposible decir cómo se me ocurrió primeramente la idea; pero una vez concebida, no pude desecharla ni de noche ni de día. No me proponía objeto alguno ni me dejaba llevar de una pasión. Amaba al buen anciano, pues jamás me había hecho daño alguno, ni menos insultado; no envidiaba su oro; pero tenía en sí algo desagradable. ¡Era uno de sus ojos, sí, esto es! Se asemejaba al de un buitre y tenía el color azul pálido. Cada vez que este ojo fijaba en mí su mirada, se me helaba la sangre en las venas; y lentamente, por grados, comenzó a germinar en mi cerebro la idea de arrancar la vida al viejo, a fin de librarme para siempre de aquel ojo que me molestaba. ¡He aquí el quid! Me creéis loco; pero advertid que los locos no razonan. ¡Si hubierais visto con qué buen juicio procedí, con qué tacto y previsión y con qué disimulo puse manos a la obra! Nunca había sido tan amable con el viejo como durante la semana que precedió al asesinato. Todas las noches, a eso de las doce, levantaba el picaporte de la puerta y la abría; pero, ¡qué suavemente! Y cuando quedaba bastante espacio para pasar la cabeza, introducía una linterna sorda bien cerrada, para que no filtrase ninguna luz, y alargaba el cuello.",
        author: "Edgar Allan Poe - El corazon delator"
      },
      {
        text: "Una mañana, tras un sueño intranquilo, Gregorio Samsa se despertó convertido en un monstruoso insecto. Estaba echado de espaldas sobre un duro caparazón y, al alzar la cabeza, vio su vientre convexo y oscuro, surcado por curvadas callosidades, sobre el que casi no se aguantaba la colcha, que estaba a punto de escurrirse hasta el suelo. Numerosas patas, penosamente delgadas en comparación con el grosor normal de sus piernas, se agitaban sin concierto. —¿Qué me ha ocurrido? No estaba soñando. Su habitación, una habitación normal, aunque muy pequeña, tenía el aspecto habitual. Sobre la mesa había desparramado un muestrario de paños —Samsa era viajante de comercio—, y de la pared colgaba una estampa recientemente recortada de una revista ilustrada y puesta en un marco dorado. La estampa mostraba a una mujer tocada con un gorro de pieles, envuelta en una estola también de pieles, y que, muy erguida, esgrimía un amplio manguito, asimismo de piel, que ocultaba todo su antebrazo. Gregorio miró hacia la ventana; estaba nublado, y sobre el cinc del alféizar repiqueteaban las gotas de lluvia, lo que le hizo sentir una gran melancolía.",
        author: "Franz Kafka - La metamorfosis"
      },
      {
        text: "Se había dado a esta esperanza por entero. Por eso era que le costaba trabajo imaginar morir así, de repente, a estas alturas de su vida, después de tanto pelear para librarse de la muerte; de haberse pasado su mejor tiempo tirando de un lado para otro arrastrado por los sobresaltos y cuando su cuerpo había acabado por ser un puro pellejo correoso curtido por los malos días en que tuvo que andar escondiéndose de todos. Por si acaso, ¿no había dejado hasta que se le fuera su mujer? Aquel día en que amaneció con la nueva de que su mujer se le había ido, ni siquiera le pasó por la cabeza la intención de salir a buscarla. Dejó que se fuera sin indagar para nada ni con quién ni para dónde, con tal de no bajar al pueblo. Dejó que se le fuera como se le había ido todo lo demás, sin meter las manos. Ya lo único que le quedaba para cuidar era la vida, y esta la conservaría a como diera lugar. No podía dejar que lo mataran. No podía. Mucho menos ahora. Pero para eso lo habían traído de allá, de Palo de Venado. No necesitaron amarrarlo para que los siguiera. Él anduvo solo, únicamente maniatado por el miedo. Ellos se dieron cuenta de que no podía correr con aquel cuerpo viejo, con aquellas piernas flacas como sicuas secas, acalambradas por el miedo de morir. Porque a eso iba. A morir. Se lo dijeron. Desde entonces lo supo. Comenzó a sentir esa comezón en el estómago que le llegaba de pronto siempre que veía de cerca la muerte y que le sacaba el ansia por los ojos, y que le hinchaba la boca con aquellos buches de agua agria que tenía que tragarse sin querer. Y esa cosa que le hacía los pies pesados mientras su cabeza se le ablandaba y el corazón le pegaba con todas sus fuerzas en las costillas. No, no podía acostumbrarse a la idea de que lo mataran.",
        author: "Juan Rulfo - El llano en llamas"
      },
      {
        text: "Ser inmortal es baladí; menos el hombre, todas las criaturas lo son, pues ignoran la muerte; lo divino, lo terrible, lo incomprensible, es saberse inmortal. He notado que, pese a las religiones, esa convicción es rarísima. Israelitas, cristianos y musulmanes profesan la inmortalidad, pero la veneración que tributan al primer siglo prueba que sólo creen en él, ya que destinan todos los demás, en número infinito, a premiarlo o a castigarlo. Más razonable me parece la rueda de ciertas religiones del Indostán; en esa rueda, que no tiene principio ni fin, cada vida es efecto de la anterior y engendra la siguiente; pero ninguna determina el conjunto... Adoctrinada por un ejercicio de siglos, la república de hombres inmortales había logrado la perfección de la tolerancia y casi del desdén. Sabía que en un plazo infinito le ocurren a todo hombre todas las cosas. Por sus pasadas o futuras virtudes todo hombre es acreedor a toda bondad, pero también a toda traición, por sus infamias del pasado o del porvenir. Así como en los juegos de azar las cifras pares y las cifras impares tienden al equilibrio, así también se anulan y se corrigen el ingenio y la estolicia, y acaso el rústico poema del Cid es el contrapeso exigido por un solo epíteto de las Églogas o por una sentencia de Heráclito. El pensamiento más fugaz obedece a un dibujo invisible y puede coronar, o inaugurar, una forma secreta. Sé de quienes obraban el mal para que en los siglos futuros resultara el bien, o hubiera resultado en los ya pretéritos... Encarados así, todos nuestros actos son justos, pero también son indiferentes. No hay méritos morales o intelectuales. Homero compuso la Odisea; postulado un plazo infinito, con infinitas circunstancias y cambios, lo imposible es no componer, siquiera una vez, la Odisea. Nadie es alguien, un solo hombre inmortal es todos los hombres. Como Cornelio Agrippa, soy dios, soy héroe, soy filósofo, soy demonio y soy mundo, lo cual es una fatigosa manera de decir que no soy.",
        author: "Jorge Luis Borges - El inmortal"
      },
      {
        text: "En la parte inferior del escalón, hacia la derecha, vi una pequeña esfera tornasolada, de casi intolerable fulgor. Al principio la creí giratoria; luego comprendí que ese movimiento era una ilusión producida por los vertiginosos espectáculos que encerraba. El diámetro del Aleph sería de dos o tres centímetros, pero el espacio cósmico estaba ahí, sin disminución de tamaño. Cada cosa (la luna del espejo, digamos) era infinitas cosas, porque yo claramente la veía desde todos los puntos del universo. Vi el populoso mar, vi el alba y la tarde, vi las muchedumbres de América, vi una plateada telaraña en el centro de una negra pirámide, vi un laberinto roto (era Londres), vi interminables ojos inmediatos escrutándose en mí como en un espejo, vi todos los espejos del planeta y ninguno me reflejó, vi en un traspatio de la calle Soler las mismas baldosas que hace treinta años vi en el zaguán de una casa en Fray Bentos, vi racimos, nieve, tabaco, vetas de metal, vapor de agua, vi convexos desiertos ecuatoriales y cada uno de sus granos de arena, vi en Inverness a una mujer que no olvidaré, vi la violenta cabellera, el altivo cuerpo, vi un cáncer en el pecho, vi un círculo de tierra seca en una vereda, donde antes hubo un árbol, vi una quinta de Adrogué, un ejemplar de la primera versión inglesa de Plinio, la de Philemon Holland, vi a un tiempo cada letra de cada página (de chico, yo solía maravillarme de que las letras de un volumen cerrado no se mezclaran y perdieran en el decurso de la noche), vi la noche y el día contemporáneo, vi un poniente en Querétaro que parecía reflejar el color de una rosa en Bengala, vi mi dormitorio sin nadie, vi en un gabinete de Alkmaar un globo terráqueo entre dos espejos que lo multiplican sin fin, vi caballos de crin arremolinada, en una playa del Mar Caspio en el alba, vi la delicada osatura de una mano, vi a los sobrevivientes de una batalla, enviando tarjetas postales, vi en un escaparate de Mirzapur una baraja española, vi las sombras oblicuas de unos helechos en el suelo de un invernáculo, vi tigres, émbolos, bisontes, marejadas y ejércitos, vi todas las hormigas que hay en la tierra, vi un astrolabio persa, vi en un cajón del escritorio (y la letra me hizo temblar) cartas obscenas, increíbles, precisas, que Beatriz había dirigido a Carlos Argentino, vi un adorado monumento en la Chacarita, vi la reliquia atroz de lo que deliciosamente había sido Beatriz Viterbo, vi la circulación de mi oscura sangre, vi el engranaje del amor y la modificación de la muerte, vi el Aleph, desde todos los puntos, vi en el Aleph la tierra, y en la tierra otra vez el Aleph y en el Aleph la tierra, vi mi cara y mis vísceras, vi tu cara, y sentí vértigo y lloré, porque mis ojos habían visto ese objeto secreto y conjetural, cuyo nombre usurpan los hombres, pero que ningún hombre ha mirado: el inconcebible universo.",
        author: "Jorge Luis Borges - El Aleph"
      },
      {
        text: "Despertabas con hambre y comías para volver a dormirte. Y tu madre te daba agua, porque ya te habías acabado la leche de ella. No tenías llenadero. Y eras muy rabioso. Nunca pensé que con el tiempo se te fuera a subir aquella rabia a la cabeza... Pero así fue. Tu madre, que descanse en paz, quería que te criaras fuerte. Creía que cuando tú crecieras irías a ser su sostén. No te tuvo más que a ti. El otro hijo que iba a tener la mató. Y tú la hubieras matado otra vez si ella estuviera viva a estas alturas. Sintió que el hombre aquel que llevaba sobre sus hombros dejó de apretar las rodillas y comenzó a soltar los pies, balanceándolo de un lado para otro. Y le pareció que la cabeza; allá arriba, se sacudía como si sollozara. Sobre su cabello sintió que caían gruesas gotas, como de lágrimas. —¿Lloras, Ignacio? Lo hace llorar a usted el recuerdo de su madre, ¿verdad? Pero nunca hizo usted nada por ella. Nos pagó siempre mal. Parece que en lugar de cariño, le hubiéramos retacado el cuerpo de maldad. ¿Y ya ve? Ahora lo han herido. ¿Qué pasó con sus amigos? Los mataron a todos. Pero ellos no tenían a nadie. Ellos bien hubieran podido decir: No tenemos a quién darle nuestra lástima. ¿Pero usted, Ignacio?",
        author: "Juan Rulfo - Pedro Paramo"
      }
    ];

    // State variables
    let currentText = '';
    let currentAuthor = '';
    let startTime = null;
    let isFinished = false;
    let totalKeystrokes = 0;
    let correctKeystrokes = 0;
    let errors = 0;

    // DOM elements
    const textDisplay = document.getElementById('textDisplay');
    const inputArea = document.getElementById('inputArea');
    const wpmDisplay = document.getElementById('wpm');
    const accuracyDisplay = document.getElementById('accuracy');
    const errorsDisplay = document.getElementById('errors');
    const progressBar = document.getElementById('progress');
    const restartBtn = document.getElementById('restartBtn');
    const resultsOverlay = document.getElementById('resultsOverlay');
    const finalWpm = document.getElementById('finalWpm');
    const finalAccuracy = document.getElementById('finalAccuracy');
    const finalTime = document.getElementById('finalTime');
    const tryAgainBtn = document.getElementById('tryAgainBtn');
    const textAuthor = document.getElementById('textAuthor');

    // Initialize
    function init() {
      const randomIndex = Math.floor(Math.random() * textsData.length);
      currentText = textsData[randomIndex].text;
      currentAuthor = textsData[randomIndex].author;
      
      renderText();
      textAuthor.textContent = currentAuthor;
      inputArea.value = '';
      inputArea.disabled = false;
      isFinished = false;
      startTime = null;
      totalKeystrokes = 0;
      correctKeystrokes = 0;
      errors = 0;
      
      wpmDisplay.textContent = '0';
      accuracyDisplay.textContent = '100';
      errorsDisplay.textContent = '0';
      progressBar.style.width = '0%';
      
      resultsOverlay.classList.remove('visible');
      
      // Scroll to top of text display
      textDisplay.scrollTop = 0;
    }

    // Render text with character spans
    function renderText() {
      textDisplay.innerHTML = '';
      const chars = currentText.split('');
      
      chars.forEach((char, index) => {
        const span = document.createElement('span');
        span.className = 'char';
        span.textContent = char;
        span.dataset.index = index;
        textDisplay.appendChild(span);
      });

      // Mark first character as current
      const firstChar = textDisplay.querySelector('.char');
      if (firstChar) {
        firstChar.classList.add('current');
      }
    }

    // Autoscroll to keep current character visible
    function scrollToCurrent(charElement) {
      if (!charElement) return;
      
      const container = textDisplay;
      const containerRect = container.getBoundingClientRect();
      const charRect = charElement.getBoundingClientRect();
      
      // Calculate relative position
      const charTop = charRect.top - containerRect.top;
      const charBottom = charRect.bottom - containerRect.top;
      
      // Margin from top and bottom (in pixels)
      const topMargin = 80;
      const bottomMargin = 80;
      
      // Check if character is above visible area
      if (charTop < topMargin) {
        container.scrollTop -= (topMargin - charTop);
      }
      // Check if character is below visible area
      else if (charBottom > containerRect.height - bottomMargin) {
        container.scrollTop += (charBottom - (containerRect.height - bottomMargin));
      }
    }

    // Update display based on input
    function updateDisplay() {
      const input = inputArea.value;
      const chars = textDisplay.querySelectorAll('.char');
      
      let correctCount = 0;
      let errorCount = 0;
      let currentCharElement = null;
      
      chars.forEach((span, index) => {
        span.classList.remove('correct', 'incorrect', 'current');
        
        if (index < input.length) {
          if (input[index] === currentText[index]) {
            span.classList.add('correct');
            correctCount++;
          } else {
            span.classList.add('incorrect');
            errorCount++;
          }
        } else if (index === input.length) {
          span.classList.add('current');
          currentCharElement = span;
        }
      });

      // Autoscroll to current character
      if (currentCharElement) {
        scrollToCurrent(currentCharElement);
      }

      // Update stats
      errors = errorCount;
      totalKeystrokes = input.length;
      correctKeystrokes = correctCount;
      
      const accuracy = totalKeystrokes > 0 
        ? Math.round((correctKeystrokes / totalKeystrokes) * 100) 
        : 100;
      
      accuracyDisplay.textContent = accuracy;
      errorsDisplay.textContent = errors;
      
      // Update progress
      const progress = (input.length / currentText.length) * 100;
      progressBar.style.width = progress + '%';
      
      // Calculate WPM
      if (startTime) {
        const timeElapsed = (Date.now() - startTime) / 1000 / 60;
        const words = input.length / 5;
        const wpm = Math.round(words / timeElapsed);
        wpmDisplay.textContent = wpm > 0 ? wpm : 0;
      }
      
      // Check completion
      if (input.length >= currentText.length && !isFinished) {
        finishTest();
      }
    }

    // Start timer on first input
    function startTimer() {
      if (!startTime) {
        startTime = Date.now();
      }
    }

    // Finish test
    function finishTest() {
      isFinished = true;
      inputArea.disabled = true;
      
      const timeElapsed = (Date.now() - startTime) / 1000;
      const words = currentText.length / 5;
      const wpm = Math.round(words / (timeElapsed / 60));
      const accuracy = totalKeystrokes > 0 ? Math.round((correctKeystrokes / totalKeystrokes) * 100) : 100;
      
      finalWpm.textContent = wpm;
      finalAccuracy.textContent = accuracy + '%';
      finalTime.textContent = Math.round(timeElapsed) + 's';
      
      setTimeout(() => {
        resultsOverlay.classList.add('visible');
      }, 300);
    }

    // Event listeners
    inputArea.addEventListener('input', () => {
      startTimer();
      updateDisplay();
    });

    // Prevent paste
    inputArea.addEventListener('paste', (e) => {
      e.preventDefault();
    });

    restartBtn.addEventListener('click', init);
    tryAgainBtn.addEventListener('click', init);

    // Focus input on click anywhere in text display
    textDisplay.addEventListener('click', () => {
      inputArea.focus();
    });

    // Keyboard shortcut for restart
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        init();
      }
    });

    // Initialize on load
    init();
  </script>
</body>
</html>
